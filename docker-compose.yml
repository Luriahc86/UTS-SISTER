version: "3.9"

services:
  # ------------------------------------------------------------------
  # Aggregator — the main FastAPI service
  # ------------------------------------------------------------------
  aggregator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: uts-aggregator
    ports:
      - "8080:8080"
    volumes:
      - dedup_data:/app/data
    environment:
      - LOG_LEVEL=INFO
      - DEDUP_DB_PATH=/app/data/dedup.db
      - PORT=8080
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  # ------------------------------------------------------------------
  # Publisher — bonus: standalone publisher for at-least-once simulation
  # ------------------------------------------------------------------
  publisher:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: uts-publisher
    depends_on:
      aggregator:
        condition: service_healthy
    environment:
      - LOG_LEVEL=INFO
    command:
      - python
      - -m
      - src.publisher
      - --host
      - aggregator
      - --port
      - "8080"
      - --count
      - "200"
      - --topic
      - "docker-test"
      - --batch-size
      - "50"
    restart: "no"

volumes:
  dedup_data:
    driver: local
